name: Set Supabase AI Secrets

on:
  workflow_dispatch:

jobs:
  set-supabase-ai-secrets:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: supabase/setup-cli@v2.0.0
        with:
          version: latest

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "SUPABASE_ACCESS_TOKEN repo secret is required." >&2
            exit 1
          fi
          if [ -z "${GOOGLE_AI_KEY:-}" ]; then
            echo "GOOGLE_AI_KEY repo secret is required." >&2
            exit 1
          fi
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY repo secret is required." >&2
            exit 1
          fi

      - name: Set Supabase AI secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            GEMINI_API_KEY="$GOOGLE_AI_KEY"
          fi
          {
            printf 'GOOGLE_AI_KEY=%s\n' "$GOOGLE_AI_KEY"
            printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY"
            printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY"
            printf 'AI_ENABLED=true\n'
            printf 'AI_ALLOW_EXPENSIVE_FALLBACK=false\n'
            printf 'AI_GLOBAL_DAILY_COST_LIMIT_USD=50\n'
            printf 'AI_GLOBAL_MONTHLY_COST_LIMIT_USD=1000\n'
          } > /tmp/supabase-ai.env
          supabase secrets set --env-file /tmp/supabase-ai.env --project-ref sxshiqyxhhifvtfqawbq
          rm -f /tmp/supabase-ai.env
